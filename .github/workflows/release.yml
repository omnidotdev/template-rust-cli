name: Release 🏗️

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Handle release 🦋
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version_commit: ${{ steps.detect_version_commit.outputs.version_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1.4.9
        with:
          version: bun run version && git add Cargo.toml
          publish: |
            echo "Publishing {{project-name}}@$(jq -r '.version' package.json)"
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect version commit
        id: detect_version_commit
        run: |
          # Detect the merged "version packages" commit even when changesets/action sets published=false
          FILES=$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          if echo "$FILES" | grep -q '^CHANGELOG.md$' \
            && echo "$FILES" | grep -q '^Cargo.toml$' \
            && echo "$FILES" | grep -q '^package.json$'; then
            echo "version_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_commit=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }} 🔨
    needs: release
    if: needs.release.outputs.published == 'true' || needs.release.outputs.version_commit == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf {{binary-name}}-${{ matrix.target }}.tar.gz {{binary-name}}
          mv {{binary-name}}-${{ matrix.target }}.tar.gz ../../../
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: {{binary-name}}-${{ matrix.target }}
          path: {{binary-name}}-${{ matrix.target }}.tar.gz

  publish:
    name: Create GitHub Release
    needs: [release, build]
    if: needs.release.outputs.published == 'true' || needs.release.outputs.version_commit == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MACOS_X86_SHA256=$(shasum -a 256 artifacts/{{binary-name}}-x86_64-apple-darwin/{{binary-name}}-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          MACOS_ARM_SHA256=$(shasum -a 256 artifacts/{{binary-name}}-aarch64-apple-darwin/{{binary-name}}-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          LINUX_X86_SHA256=$(shasum -a 256 artifacts/{{binary-name}}-x86_64-unknown-linux-gnu/{{binary-name}}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          LINUX_ARM_SHA256=$(shasum -a 256 artifacts/{{binary-name}}-aarch64-unknown-linux-gnu/{{binary-name}}-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/omnidotdev/homebrew-tap.git tap
          cd tap

          mkdir -p Formula
          cat > Formula/{{binary-name}}.rb <<'FORMULAEOF'
          class {{formula-class}} < Formula
            desc "{{description}}"
            homepage "https://{{binary-name}}.omni.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/omnidotdev/{{project-name}}/releases/download/v${VERSION}/{{binary-name}}-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM_SHA256}"
              end
              on_intel do
                url "https://github.com/omnidotdev/{{project-name}}/releases/download/v${VERSION}/{{binary-name}}-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X86_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/omnidotdev/{{project-name}}/releases/download/v${VERSION}/{{binary-name}}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM_SHA256}"
              end
              on_intel do
                url "https://github.com/omnidotdev/{{project-name}}/releases/download/v${VERSION}/{{binary-name}}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            def install
              bin.install "{{binary-name}}"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/{{binary-name}} --version")
            end
          end
          FORMULAEOF
          sed -i "s/\${VERSION}/${VERSION}/g; s/\${MACOS_ARM_SHA256}/${MACOS_ARM_SHA256}/g; s/\${MACOS_X86_SHA256}/${MACOS_X86_SHA256}/g; s/\${LINUX_X86_SHA256}/${LINUX_X86_SHA256}/g; s/\${LINUX_ARM_SHA256}/${LINUX_ARM_SHA256}/g" Formula/{{binary-name}}.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/{{binary-name}}.rb
          git commit -m "chore: update {{binary-name}} to v${VERSION}"
          git push
      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<SSH
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSH
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          SOURCE_SHA256=$(curl -sL "https://github.com/omnidotdev/{{project-name}}/archive/v${VERSION}.tar.gz" | shasum -a 256 | awk '{print $1}')

          publish_aur() {
            local pkg="$1" sha="$2"
            git clone "ssh://aur@aur.archlinux.org/${pkg}.git" "${pkg}" 2>/dev/null || {
              mkdir "${pkg}" && cd "${pkg}" && git init && git remote add origin "ssh://aur@aur.archlinux.org/${pkg}.git" && cd ..
            }
            cd "${pkg}"
            cp "../misc/packaging/aur/${pkg}/PKGBUILD" .
            sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
            if [ -n "$sha" ]; then
              sed -i "s/^sha256sums=.*/sha256sums=('${sha}')/" PKGBUILD
            fi
            # Generate .SRCINFO from PKGBUILD
            docker run --rm -v "$PWD:/pkg" -w /pkg archlinux:base bash -c \
              "pacman -Sy --noconfirm base-devel >/dev/null 2>&1 && useradd -m builder && su -s /bin/bash builder -c 'makepkg --printsrcinfo'" > .SRCINFO
            git config user.name "Omni LLC"
            git config user.email "team@omni.dev"
            git add PKGBUILD .SRCINFO
            git diff --cached --quiet || git commit -m "Update to v${VERSION}"
            git push origin master
            cd ..
          }

          publish_aur "omnidotdev-{{project-name}}" "$SOURCE_SHA256"
          publish_aur "omnidotdev-{{project-name}}-bin" ""

          rm -f ~/.ssh/aur
